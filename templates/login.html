<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign in — Vex Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Instrument+Serif&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { background: #131316; color: #e4e1e6; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full space-y-6">
    <div class="text-center space-y-2">
        <div class="w-14 h-14 mx-auto rounded-2xl bg-[#63dac3]/20 flex items-center justify-center text-[#63dac3]">
            <span class="material-symbols-outlined">dataset</span>
        </div>
        <h1 class="text-4xl font-serif" style="font-family:'Instrument Serif',serif">Welcome to Vex</h1>
        <p class="text-sm text-[#8a8a94]">Your AI-powered productivity engine.</p>
    </div>
    
    <div class="bg-[#1b1b1e] border border-[#27272A] rounded-2xl p-6 space-y-4 shadow-2xl">
        <button id="google-btn" class="w-full py-2.5 rounded-lg bg-[#63dac3] text-[#00382f] font-bold text-sm hover:brightness-110 flex items-center justify-center gap-2 transition-all">
            Continue with Google
        </button>
        
        <div class="flex items-center gap-2 text-[10px] text-[#8a8a94] uppercase tracking-widest"><span class="flex-1 border-t border-[#27272A]"></span>OR<span class="flex-1 border-t border-[#27272A]"></span></div>
        
        <div class="space-y-3">
            <input id="email" type="email" placeholder="Email Address" class="w-full bg-[#131316] border border-[#27272A] rounded-lg p-2.5 text-sm focus:border-[#63dac3] focus:ring-1 focus:ring-[#63dac3] outline-none text-white transition-all"/>
            <input id="password" type="password" placeholder="Password" class="w-full bg-[#131316] border border-[#27272A] rounded-lg p-2.5 text-sm focus:border-[#63dac3] focus:ring-1 focus:ring-[#63dac3] outline-none text-white transition-all"/>
        </div>
        
        <div class="flex gap-2">
            <button id="signin-btn" class="flex-1 py-2 rounded-lg bg-[#2a2a2d] border border-[#27272A] text-white font-bold text-sm hover:bg-[#353438] transition-all">Log In</button>
            <button id="signup-btn" class="flex-1 py-2 rounded-lg bg-[#2a2a2d] border border-[#27272A] text-white font-bold text-sm hover:bg-[#353438] transition-all">Sign Up</button>
        </div>
        <p id="msg" class="text-xs text-center hidden"></p>
    </div>
    
    <p class="text-center text-xs text-[#8a8a94]"><a href="/" class="hover:text-[#63dac3] transition-colors">← Back to Home</a></p>
</div>

<script>
    const SUPABASE_URL = '{{ supabase_url }}';
    const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
    
    const msg = document.getElementById('msg');
    function showMsg(text, isError=true) { 
        msg.textContent = text; 
        msg.className = `text-xs text-center block ${isError ? 'text-red-400' : 'text-[#63dac3]'}`; 
    }

    if (!SUPABASE_URL) showMsg("Supabase keys are missing from the backend (.env)", true);
    
    const supa = SUPABASE_URL ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    // Redirect to dashboard if already logged in
    window.onload = async () => {
        if (supa) {
            const { data: { session } } = await supa.auth.getSession();
            if (session) window.location.href = '/dashboard';
        }
    };

    document.getElementById('google-btn').onclick = async () => {
        if (!supa) return showMsg('Configure Supabase first.');
        await supa.auth.signInWithOAuth({ 
            provider: 'google',
            options: { 
                scopes: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events https://mail.google.com/ https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/tasks', 
                redirectTo: window.location.origin + '/auth/callback' 
            }
        });
    };

    document.getElementById('signin-btn').onclick = async () => {
        if (!supa) return;
        const { error } = await supa.auth.signInWithPassword({ email: email.value, password: password.value });
        if (error) showMsg(error.message); else location.href = '/dashboard';
    };

    document.getElementById('signup-btn').onclick = async () => {
        if (!supa) return;
        const { error } = await supa.auth.signUp({ email: email.value, password: password.value });
        if (error) showMsg(error.message); else showMsg('Check your email to confirm registration.', false);
    };
</script>
</body>
</html>
