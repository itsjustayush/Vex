<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Vex | Authentication</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#63dac3", background: "#131316", "slate-border": "#27272A", "surface-container-lowest": "#0e0e11", "on-surface": "#e4e1e6", "slate-text": "#52525B", "on-surface-variant": "#bcc9c5"
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #131316; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% 50%, rgba(54, 180, 159, 0.05) 0%, transparent 50%), linear-gradient(to right, #1b1b1e 1px, transparent 1px), linear-gradient(to bottom, #1b1b1e 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; }
        .auth-card { backdrop-filter: blur(12px); background: rgba(31, 31, 34, 0.7); border: 1px solid #27272A; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-on-surface">

<nav class="fixed top-8 left-8">
    <a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-sm group" href="/">
        <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
        Back to Home
    </a>
</nav>

<main class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="flex flex-col items-center mb-10">
        <div class="w-16 h-16 bg-primary/20 rounded-xl flex items-center justify-center mb-4">
            <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
        </div>
        <h1 class="text-3xl font-bold mb-2">Welcome to Vex</h1>
        <p class="text-sm text-on-surface-variant">Sign in to your account to continue</p>
    </div>

    <div class="auth-card p-8 rounded-xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 blur-[80px] rounded-full pointer-events-none"></div>
        
        <div class="flex border-b border-slate-border mb-8">
            <button class="flex-1 pb-4 text-primary font-bold border-b-2 border-primary text-xs uppercase tracking-widest">Log In</button>
            <button class="flex-1 pb-4 text-on-surface-variant border-b-2 border-transparent hover:text-on-surface text-xs uppercase tracking-widest transition-all">Sign Up</button>
        </div>

        <form class="space-y-5" onsubmit="window.location.href='/dashboard'; return false;">
            <div>
                <label class="block text-xs text-on-surface-variant mb-2 uppercase tracking-wider font-bold">Email Address</label>
                <input class="w-full bg-surface-container-lowest border border-slate-border rounded-lg py-3 px-4 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-slate-text" placeholder="name@company.com" type="email" required/>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs text-on-surface-variant uppercase tracking-wider font-bold">Password</label>
                    <a class="text-[11px] text-primary hover:underline uppercase tracking-wider" href="#">Forgot?</a>
                </div>
                <div class="relative">
                    <input class="w-full bg-surface-container-lowest border border-slate-border rounded-lg py-3 px-4 text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-slate-text" placeholder="••••••••" type="password" required/>
                </div>
            </div>
            <button class="w-full bg-primary py-3 px-4 rounded-lg text-[#00382f] text-lg font-bold hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(99,218,195,0.2)]" type="submit">
                Log In
            </button>
        </form>
    </div>
</main>
</body>
</html>
