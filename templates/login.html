<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vex | Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#63dac3", background: "#131316", "slate-border": "#27272A", "surface-container-low": "#1b1b1e", "on-surface": "#e4e1e6", "slate-text": "#52525B", "on-surface-variant": "#bcc9c5"} } } }
</script>
<style>
    body {
      background-color: #131316;
      background-image: radial-gradient(circle at 50% 50%, rgba(54, 180, 159, 0.05) 0%, transparent 50%), linear-gradient(to right, #1b1b1e 1px, transparent 1px), linear-gradient(to bottom, #1b1b1e 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
    }
    .auth-card { backdrop-filter: blur(12px); background: rgba(31, 31, 34, 0.7); border: 1px solid #27272A; }
    .social-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .social-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: #36B49F; transform: translateY(-1px); }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-on-surface font-sans">
<nav class="fixed top-8 left-8"><a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-sm" href="/"><span class="material-icons text-[18px]">arrow_back</span>Back to Home</a></nav>

<main class="w-full max-w-md animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="flex flex-col items-center mb-10">
    <div class="mb-4 w-16 h-16 bg-primary/20 rounded-xl flex items-center justify-center shadow-lg border border-primary/30">
        <span class="material-icons text-primary text-4xl">bolt</span>
    </div>
    <h1 class="text-3xl font-bold text-on-surface mb-2">Welcome to Vex</h1>
    <p class="text-sm text-on-surface-variant">Sign in to your account to continue</p>
</div>

<div class="auth-card p-8 rounded-xl shadow-2xl relative overflow-hidden">
    <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 blur-[80px] rounded-full pointer-events-none"></div>

    <div class="flex border-b border-slate-border mb-8">
        <button class="flex-1 pb-4 text-primary font-bold border-b-2 border-primary text-xs uppercase tracking-widest">Log In</button>
    </div>

    <div class="space-y-3 mb-8">
        <button id="btn-google" class="social-btn w-full flex items-center justify-center gap-3 py-3 px-4 rounded-lg border border-slate-border text-on-surface text-sm bg-surface-container-low">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path></svg>
            Continue with Google
        </button>
        <button id="btn-github" class="social-btn w-full flex items-center justify-center gap-3 py-3 px-4 rounded-lg border border-slate-border text-on-surface text-sm bg-surface-container-low">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.24.73-.53v-1.84c-3.03.66-3.67-1.46-3.67-1.46-.5-1.24-1.21-1.58-1.21-1.58-1-1 .08-.66.08-.66 1.1.08 1.68 1.13 1.68 1.13.98 1.68 2.58 1.19 3.21.9.1-.71.39-1.19.71-1.46-2.42-.27-4.97-1.21-4.97-5.39 0-1.19.42-2.17 1.12-2.93-.11-.27-.48-1.39.11-2.89 0 0 .91-.29 2.99 1.12a10.43 10.43 0 015.5 0c2.08-1.41 2.99-1.12 2.99-1.12.59 1.5.22 2.62.11 2.89.7.76 1.12 1.74 1.12 2.93 0 4.19-2.55 5.11-4.98 5.38.39.33.74.99.74 2v2.97c0 .29.18.62.74.52A11 11 0 0012 1.27z" fill="currentColor"></path></svg>
            Continue with GitHub
        </button>
    </div>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Injected securely from Flask backend via Jinja2
    const SUPABASE_URL = '{{ supabase_url }}';
    const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
    
    let supabase;
    if (SUPABASE_URL && SUPABASE_ANON_KEY) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    document.getElementById('btn-google').addEventListener('click', async () => {
        if (!supabase) return alert("Supabase keys not configured.");
        const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/dashboard' }});
        if (error) console.error("Login Error:", error.message);
    });

    document.getElementById('btn-github').addEventListener('click', async () => {
        if (!supabase) return alert("Supabase keys not configured.");
        const { error } = await supabase.auth.signInWithOAuth({ provider: 'github', options: { redirectTo: window.location.origin + '/dashboard' }});
        if (error) console.error("Login Error:", error.message);
    });
</script>
</body>
</html>
