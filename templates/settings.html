<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="utf-8">
    <title>Settings — Vex Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body{background:#131316;color:#e4e1e6;font-family:'Inter',sans-serif}</style>
</head>
<body class="min-h-screen">
<div class="max-w-2xl mx-auto p-8 space-y-6 mt-10">
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">Settings</h1>
        <a href="/dashboard" class="text-sm text-[#63dac3] hover:brightness-110">← Back to Workspace</a>
    </div>
    
    <div class="bg-[#1b1b1e] border border-[#27272A] rounded-2xl p-6 space-y-3 shadow-lg">
        <h2 class="font-bold text-lg text-[#63dac3]">Account Profile</h2>
        <p class="text-sm text-[#bcc9c5]" id="acct-email">Loading data…</p>
        <button id="signout" class="mt-4 px-5 py-2 rounded-lg bg-red-500/10 text-red-400 border border-red-500/20 font-bold text-xs hover:bg-red-500/20 transition-all">Sign Out of Vex</button>
    </div>
    
    <div class="bg-[#1b1b1e] border border-[#27272A] rounded-2xl p-6 space-y-3 shadow-lg">
        <h2 class="font-bold text-lg text-[#63dac3]">Google Workspace Integration</h2>
        <p class="text-sm text-[#bcc9c5]">Sign in with Google to securely sync your primary calendar into the Vex workspace.</p>
        <button id="link-google" class="px-5 py-2 mt-2 rounded-lg bg-white text-black font-bold text-xs hover:brightness-90 transition-all">Link Google Calendar</button>
    </div>
</div>

<script>
    const SUPABASE_URL = '{{ supabase_url }}';
    const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';
    const supa = SUPABASE_URL ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    window.onload = async () => {
        if (!supa) return document.getElementById('acct-email').textContent = 'Error: Missing backend configuration.';
        const { data: { session } } = await supa.auth.getSession();
        if (session) {
            document.getElementById('acct-email').textContent = `Authenticated as: ${session.user.email}`;
        } else {
            window.location.href = '/login';
        }
    };

    document.getElementById('signout').onclick = async () => { 
        if (supa) await supa.auth.signOut(); 
        location.href = '/login'; 
    };

    document.getElementById('link-google').onclick = async () => { 
        if (!supa) return; 
        await supa.auth.signInWithOAuth({
            provider: 'google', 
            options: { scopes: 'https://www.googleapis.com/auth/calendar.readonly', redirectTo: window.location.origin + '/auth/callback' }
        }); 
    };
</script>
</body>
</html>
