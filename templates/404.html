<!DOCTYPE html>
<html lang="en" class="dark" style="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vex | 404 Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        try {
            tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#63dac3", background: "#131316", "slate-border": "#27272A", "on-surface": "#e4e1e6", "slate-text": "#52525B", "surface-container-low": "#1b1b1e"} } } }
        } catch (_e) {}
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #131316; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glitch-layer { animation: glitch 2s infinite linear alternate-reverse; }
        @keyframes glitch { 0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 2px); } 20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -2px); } 40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); } 60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); } 80% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 2px); } 100% { clip-path: inset(30% 0 50% 0); transform: translate(2px, -2px); } }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col overflow-hidden">

<nav class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-10 py-8 pointer-events-auto">
    <a href="/" class="flex items-center gap-3">
        <div class="w-8 h-8 bg-primary rounded-sm flex items-center justify-center">
            <span class="material-symbols-outlined text-background font-bold text-xl">bolt</span>
        </div>
        <span class="text-xl font-bold text-primary tracking-tight">Vex</span>
    </a>
    <div class="hidden md:flex gap-8">
        <a href="/dashboard" class="text-slate-text text-xs font-bold uppercase hover:text-primary transition-colors tracking-widest">Dashboard</a>
        <a href="/docs" class="text-slate-text text-xs font-bold uppercase hover:text-primary transition-colors tracking-widest">Documentation</a>
    </div>
</nav>

<main class="relative z-10 flex-grow flex flex-col items-center justify-center px-6 text-center pt-24">
    <div class="relative mb-8 select-none">
        <h1 class="text-[128px] font-bold text-[#353438] opacity-20 leading-none">404</h1>
        <div class="absolute inset-0 flex items-center justify-center">
            <h1 class="text-[128px] font-bold text-primary relative tracking-widest leading-none" style="text-shadow: 0 0 30px rgba(99, 218, 195, 0.6);">
                404
                <span class="absolute inset-0 text-[#ff00ff] opacity-40 glitch-layer mix-blend-screen" style="animation-delay: -0.5s;">404</span>
                <span class="absolute inset-0 text-[#00ffff] opacity-40 glitch-layer mix-blend-screen" style="animation-delay: -1s;">404</span>
            </h1>
        </div>
    </div>

    <div class="max-w-2xl space-y-4">
        <p class="text-xs text-primary font-bold uppercase tracking-[0.3em]">Status: Node Terminated</p>
        <h2 class="text-3xl font-bold">This thought seems to have been disconnected.</h2>
        <p class="text-lg text-slate-text max-w-lg mx-auto">
            The requested resource is no longer broadcasting on the current network frequency. It may have been moved or archived.
        </p>
    </div>

    <div class="mt-12 flex flex-col sm:flex-row gap-6">
        <a href="/dashboard" class="bg-primary hover:bg-[#4ebfac] text-[#00382f] px-8 py-3 rounded-lg font-bold transition-all transform hover:scale-105 shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">dashboard</span>
            Return to Dashboard
        </a>
    </div>
</main>
</body>
</html>
