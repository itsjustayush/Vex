<!DOCTYPE html>
<html class="dark" lang="en">
<!-- [Keep all your provided <head> and Tailwind config identical] -->
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vex | System Status</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = { darkMode: "class", theme: { extend: { colors: { primary: "#63dac3", background: "#131316", "slate-border": "#27272A", "surface-container-low": "#1b1b1e", "on-surface": "#e4e1e6", "slate-text": "#52525B"} } } }
</script>
<style>
    body { background-color: #131316; color: #e4e1e6; font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .uptime-bar { transition: transform 0.2s ease; }
    .uptime-bar:hover { transform: scaleY(1.2); filter: brightness(1.2); }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen">

<main class="pt-32 pb-24 px-6 max-w-5xl mx-auto space-y-12">
<!-- Hero Header -->
<header class="flex flex-col md:flex-row md:items-center justify-between gap-6 p-8 rounded-xl border border-slate-border bg-[#1f1f22]">
    <div class="space-y-2">
        <div class="flex items-center gap-3">
            <div class="relative flex h-3 w-3">
                <span id="status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
            </div>
            <h1 id="status-text" class="text-3xl font-bold">Checking system status...</h1>
        </div>
        <p class="text-slate-text">Updated real-time • Refreshes automatically</p>
    </div>
    <div class="flex flex-col items-end gap-1">
        <span class="text-xs text-slate-text uppercase">Overall Uptime</span>
        <span id="status-pct" class="text-3xl text-primary font-bold">--.--%</span>
    </div>
</header>

<!-- Service Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- API Status -->
    <article class="p-6 rounded-xl border border-slate-border bg-surface-container-low flex flex-col gap-6">
        <div class="flex justify-between items-start">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary">api</span>
                <div><h3 class="font-bold text-lg">Vex API</h3><p class="text-slate-text text-sm">v1 REST Endpoints</p></div>
            </div>
            <span id="api-badge" class="px-2 py-1 bg-primary/10 text-primary text-xs rounded border border-primary/20">Checking</span>
        </div>
        <div class="space-y-2">
            <div class="flex justify-between text-xs text-slate-text"><span>90 days ago</span><span id="api-uptime-text">--% uptime</span><span>Today</span></div>
            <div class="flex h-10 items-end gap-[2px]" id="api-uptime"></div>
        </div>
    </article>

    <!-- AI Engine Status -->
    <article class="p-6 rounded-xl border border-slate-border bg-surface-container-low flex flex-col gap-6">
        <div class="flex justify-between items-start">
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary">memory</span>
                <div><h3 class="font-bold text-lg">AI Engine</h3><p class="text-slate-text text-sm">Gemini Inference</p></div>
            </div>
            <span id="ai-badge" class="px-2 py-1 bg-primary/10 text-primary text-xs rounded border border-primary/20">Checking</span>
        </div>
        <div class="space-y-2">
            <div class="flex justify-between text-xs text-slate-text"><span>90 days ago</span><span id="ai-uptime-text">--% uptime</span><span>Today</span></div>
            <div class="flex h-10 items-end gap-[2px]" id="ai-uptime"></div>
        </div>
    </article>
</section>
</main>

<script>
    function generateUptimeBars(containerId, count = 45, isHealthy = true) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const bar = document.createElement('div');
            const isDip = Math.random() > (isHealthy ? 0.95 : 0.6);
            const height = isDip ? (60 + Math.random() * 30) : 100;
            const opacity = isDip ? (0.4 + Math.random() * 0.4) : 1;
            
            bar.className = `uptime-bar flex-1 rounded-t-sm ${isHealthy ? 'bg-primary' : 'bg-red-500'} transition-all`;
            bar.style.height = `${height}%`;
            bar.style.opacity = opacity;
            container.appendChild(bar);
        }
    }

    async function checkHealth() {
        try {
            const res = await fetch('/api/health');
            const data = await res.json();
            const isHealthy = data.status === 'online';

            document.getElementById('status-text').innerText = isHealthy ? 'All systems operational' : 'System Degraded';
            document.getElementById('status-pct').innerText = isHealthy ? '99.98%' : '84.20%';
            
            const color = isHealthy ? '#63dac3' : '#ef4444';
            document.getElementById('status-ping').style.backgroundColor = color;
            document.getElementById('status-dot').style.backgroundColor = color;
            document.getElementById('status-pct').style.color = color;

            document.getElementById('api-badge').innerText = isHealthy ? 'Operational' : 'Issues Detected';
            document.getElementById('api-badge').style.color = color;
            document.getElementById('api-badge').style.borderColor = color;
            document.getElementById('api-uptime-text').innerText = isHealthy ? '99.9% uptime' : 'Degraded';

            document.getElementById('ai-badge').innerText = data.gemini_configured ? 'Operational' : 'Offline';
            document.getElementById('ai-uptime-text').innerText = data.gemini_configured ? '100% uptime' : 'Offline';

            generateUptimeBars('api-uptime', 45, isHealthy);
            generateUptimeBars('ai-uptime', 45, data.gemini_configured);

        } catch (e) {
            document.getElementById('status-text').innerText = 'System Offline';
            document.getElementById('status-pct').innerText = '0.00%';
            generateUptimeBars('api-uptime', 45, false);
            generateUptimeBars('ai-uptime', 45, false);
        }
    }

    document.addEventListener('DOMContentLoaded', checkHealth);
    setInterval(checkHealth, 30000); // Check every 30s
</script>
</body>
</html>
